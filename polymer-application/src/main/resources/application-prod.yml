spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    druid:
      # 主库数据源
      master:
        url: jdbc:mysql://localhost:3306/polymer?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
        username: root
        password: 123456
      # 从库数据源
      slave:
        # 从数据源开关/默认关闭
        enabled: false
        url: jdbc:mysql://localhost:3306/polymer?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
        username: root
        password: 123456
      # 初始连接数
      initial-size: 5
      # 最小连接池数量
      min-idle: 10
      # 最大连接池数量
      max-active: 20
      # 配置获取连接等待超时的时间
      max-wait: 60000
      # 配置连接超时时间
      connect-timeout: 30000
      # 配置网络超时时间
      socket-timeout: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      max-evictable-idle-time-millis: 900000
      # 配置检测连接是否有效
      validation-query: SELECT 1 FROM DUAL
      test-whileIdle: true
      test-on-borrow: false
      test-on-return: false

  # redis配置项
  redis:
    database: 1
    host: localhost
    port: 6379
    #password:
    #timeout: 6000ms  # 连接超时时长（git add毫秒）

# open api配置项
springdoc:
  swagger-ui:
    #本地和测试站开启
    enabled: false
  api-docs:
    #本地和测试站开启
    enabled: false

# polymer配置
polymer:
  # 存储配置项
  storage:
    enabled: true
    config:
      # 存储类型：local、aliyun、tencent、qiniu、huawei、minio、rustfs
      type: minio
      domain: http://127.0.0.1:9000/polymer
    minio:
      end-point: http://127.0.0.1:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket-name: polymer

  # 代码生成配置
  generator:
    enabled: false
    path: /generator/**
    template: /template/polymer
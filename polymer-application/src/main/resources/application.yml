# Tomcat配置项
server:
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 200
      min-spare: 30
  port: 8081
  servlet:
    context-path: /polymer
    session:
      cookie:
        http-only: true

# spring配置项
spring:
  application:
    name: polymer
  profiles:
    active: dev
  jackson:
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB
  freemarker:
    check-template-location: false
  mvc:
    path-match:
      matching-strategy: ant_path_matcher


# MyBatis
mybatis:
  # 搜索指定包别名
  type-aliases-package: com.polymer.**.entity
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    #使全局的映射器启用或禁用缓存
    cache-enabled: true
    #允许JDBC 支持自动生成主键
    use-generated-keys: true
    #配置默认的执行器.SIMPLE就是普通执行器;REUSE执行器会重用预处理语句(prepared statements);BATCH执行器将重用语句并执行批量更新
    default-executor-type: SIMPLE
    #开启驼峰映射
    map-underscore-to-camel-case: true

# PageHelper分页插件
pagehelper:
  #指定数据库方言，例如mysql
  helper-dialect: mysql
  #是否支持通过Mapper接口方法的参数来传递分页参数
  support-methods-arguments: true
  #设置为count=countSql可以防止SQL注入
  params: count=countSql
  #允许pageSize为0，即查询出全部结果
  page-size-zero: true

# polymer配置项
polymer:
  # xss配置
  xss:
    enabled: false
    exclude-urls:
      - /generator/**

  # token配置
  security:
    # 2小时过期
    access-token-expire: 7200
    # 14天过期
    refresh-token-expire: 1209600
    #开启同一用户异地登录踢人功能，true开启，false关闭。
    kick-out: false

  # api接口加密配置项AES+RSA
  api-decrypt:
    # 是否开启全局接口加密
    enabled: true
    # AES 加密头标识
    header-flag: encrypt-key
    # 响应加密公钥 非对称算法的公私钥 RSA 使用者请自行更换
    # 对应前端解密私钥
    public-key: 
    # 请求解密私钥 非对称算法的公私钥 RSA 使用者请自行更换
    # 对应前端加密公钥
    private-key: 